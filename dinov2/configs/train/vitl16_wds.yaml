# example configuration using a webdataset of tar shards
train:
  dataset_path: webdataset
  batch_size_per_gpu: 32
  num_workers: 2
  slideflow:
    webdataset_path: "/scratch1/pearson_lab/frank/webdataset/brca"
    shard_pattern: "tiles-*.tar"   # glob pattern for shard files (default: tiles-*.tar)
    shuffle_buffer: 0              # sample-level shuffle buffer size (0 to disable, default: 0)
    seed: 42                       # base seed for pseudorandom shard ordering per epoch

evaluation:
  eval_period_iterations: 125000

student:
  block_chunks: 4
